<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IME Milestone Tracker v16 — Wiley-VCH</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono',Consolas,monospace,system-ui;font-size:13px;background:#f0f2f5;min-height:100vh;padding:16px}
#app{display:flex;flex-direction:column;height:calc(100vh - 32px);min-height:580px;border:0.5px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#f8f9fb;box-shadow:0 4px 24px #0000000f}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:#fff;border-bottom:0.5px solid #e2e8f0;flex-shrink:0}
.logo{font-family:Georgia,serif;font-size:16px;color:#0f172a;font-weight:700}
.logo em{color:#c53030;font-style:italic}
.nav{display:flex;gap:3px;margin-left:10px}
.nb{padding:4px 11px;border-radius:6px;border:0.5px solid transparent;background:transparent;color:#94a3b8;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .12s}
.nb:hover{background:#f1f5f9;color:#475569}
.nb.on{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.sp{flex:1}
.kc{font-size:10px;color:#94a3b8}
.model-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.3px}
.badge-opus{background:#f3e8ff;color:#7c3aed;border:0.5px solid #d8b4fe}
.badge-sonnet{background:#e0f2fe;color:#0369a1;border:0.5px solid #bae6fd}

/* ── Act Now bar ── */
.abar{background:#fef2f2;border-bottom:0.5px solid #fecaca;padding:6px 16px;font-size:11px;color:#dc2626;display:none;align-items:center;gap:8px;flex-shrink:0}
.abar.on{display:flex}
.pulse{width:7px;height:7px;border-radius:50%;background:#e53e3e;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.alink{cursor:pointer;text-decoration:underline;margin-right:8px;font-weight:700}

/* ── Body ── */
.body{display:flex;flex:1;overflow:hidden}
.sb{width:252px;flex-shrink:0;overflow-y:auto;border-right:0.5px solid #e2e8f0;padding:10px;background:#fff}
.fi{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.si{width:100%;padding:6px 9px;background:#f8f9fb;border:0.5px solid #e2e8f0;border-radius:6px;color:#0f172a;font-family:inherit;font-size:11px;outline:none}
.si:focus{border-color:#93c5fd}
.fr{display:flex;gap:4px}
.alist{display:flex;flex-direction:column;gap:3px}
.ac{padding:8px 10px;border-radius:6px;border:0.5px solid #e2e8f0;background:#f8f9fb;cursor:pointer;transition:all .12s}
.ac:hover{background:#f1f5f9;border-color:#cbd5e0}
.ac.sel{background:#eff6ff;border-color:#93c5fd}
.acr{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.an{font-size:11px;color:#0f172a;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tier{font-size:9px;color:#94a3b8;letter-spacing:.8px}
.ata{font-size:10px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbg{display:inline-block;margin-top:3px;font-size:9px;color:#744210;background:#fffbeb;padding:1px 5px;border-radius:3px;border:0.5px solid #fde68a;line-height:1.4;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:18px;background:#f8f9fb}
.d-name{font-family:Georgia,serif;font-size:22px;color:#0f172a;margin-bottom:8px;font-weight:700}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:2px 8px;border-radius:12px;font-size:9px;letter-spacing:.4px;text-transform:uppercase;border:0.5px solid}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.df{background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;padding:10px;box-shadow:0 1px 2px #0000000a}
.dl{font-size:9px;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.dv{font-size:12px;color:#475569;line-height:1.5}
.dv.hi{color:#0f172a;font-weight:500}
.pib{background:#f0fdf4;border:0.5px solid #86efac;border-radius:8px;padding:10px;margin-bottom:10px}
.nb2{background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;padding:10px;margin-bottom:10px;box-shadow:0 1px 2px #0000000a}
.scb{background:#fffbeb;border:0.5px solid #fde68a;border-radius:8px;padding:10px;margin-bottom:10px}
.evb{background:#faf5ff;border:0.5px solid #e9d5ff;border-radius:8px;padding:10px;margin-bottom:10px}
.ar{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.btn{padding:6px 12px;border-radius:6px;border:0.5px solid #e2e8f0;background:#fff;color:#0f172a;font-family:inherit;font-size:11px;cursor:pointer;transition:all .12s}
.btn:hover{background:#f8f9fb}
.btnp{background:#2563eb;color:#fff;border-color:#2563eb}.btnp:hover{background:#1d4ed8}
.btna{background:#f0fdf4;color:#16a34a;border-color:#86efac}
.btnd{background:#fee2e2;color:#dc2626;border-color:#fecaca}
.btnv{background:#f3e8ff;color:#7c3aed;border-color:#d8b4fe}
.btnsm{padding:4px 9px;font-size:10px}
.fg{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.fg label{font-size:9px;color:#94a3b8;letter-spacing:1px;text-transform:uppercase}
.fg input,.fg select,.fg textarea{padding:6px 8px;background:#f8f9fb;border:0.5px solid #e2e8f0;border-radius:5px;color:#0f172a;font-family:inherit;font-size:11px;outline:none}
.fg textarea{resize:vertical;min-height:55px}
.fgr{display:flex;gap:8px}.fgr .fg{flex:1}
.es{color:#94a3b8;font-size:11px;padding:14px 0;text-align:center}
.mo{position:absolute;inset:0;background:#00000045;z-index:50;display:flex;align-items:center;justify-content:center;border-radius:12px}
.md{background:#fff;border:0.5px solid #e2e8f0;border-radius:12px;padding:20px;width:480px;max-height:560px;overflow-y:auto;box-shadow:0 20px 50px #0000001f}
.mt{font-family:Georgia,serif;font-size:16px;color:#0f172a;margin-bottom:14px;font-weight:700}
.stage-group{margin-bottom:20px}
.stage-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid #e2e8f0}
.stage-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.stage-cnt{font-size:10px;color:#94a3b8}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px}
.pc{padding:10px;background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all .12s;box-shadow:0 1px 2px #0000000a}
.pc:hover{border-color:#cbd5e0;transform:translateY(-1px);box-shadow:0 4px 10px #0000001a}
.pn{font-size:11px;color:#0f172a;font-weight:700;margin-bottom:3px}
.pd{font-size:10px;color:#94a3b8;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pf{display:flex;justify-content:space-between;align-items:center}
.pt{font-size:9px;color:#cbd5e0}
.type-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.sig-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;white-space:nowrap}

/* ── Evidence ── */
.ev-view{max-width:880px}
.ev-title{font-family:Georgia,serif;font-size:18px;color:#0f172a;margin-bottom:4px;font-weight:700}
.ev-desc{font-size:11px;color:#94a3b8;margin-bottom:14px;line-height:1.6}
.ev-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.ev-fi{padding:4px 10px;border-radius:12px;font-size:10px;cursor:pointer;border:0.5px solid #e2e8f0;background:#f8f9fb;color:#64748b}
.ev-fi.on{border-color:#bfdbfe;background:#eff6ff;color:#2563eb}
.ev-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px #0000000a}
.ev-table th{padding:8px 10px;background:#f8f9fb;border-bottom:0.5px solid #e2e8f0;font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;text-align:left}
.ev-table td{padding:9px 10px;border-bottom:0.5px solid #f1f5f9;font-size:11px;vertical-align:top}
.ev-table tr:last-child td{border-bottom:none}
.ev-table tr:hover td{background:#f8f9fb}
.ev-acc{font-weight:700;color:#0f172a;cursor:pointer;text-decoration:underline}
.ev-nct{font-size:10px;color:#64748b;font-family:monospace}

/* ── Scan / Briefing / ADP shared panel ── */
.ai-view{max-width:760px}
.ai-title{font-family:Georgia,serif;font-size:18px;color:#0f172a;margin-bottom:4px;font-weight:700}
.ai-desc{font-size:11px;color:#94a3b8;margin-bottom:14px;line-height:1.6}
.ai-input-area{width:100%;padding:10px 12px;background:#fff;border:0.5px solid #e2e8f0;border-radius:8px;font-family:inherit;font-size:11px;color:#0f172a;resize:vertical;min-height:100px;outline:none;margin-bottom:10px}
.ai-input-area:focus{border-color:#93c5fd}
.ai-actions{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.ai-out{background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;padding:16px;font-size:12px;color:#475569;line-height:1.9;white-space:pre-wrap;box-shadow:0 1px 3px #0000000a;min-height:120px}
.ai-loading{color:#94a3b8;font-size:11px;padding:14px 0;animation:fd 1s infinite alternate}
@keyframes fd{from{opacity:.4}to{opacity:1}}
.model-indicator{display:flex;align-items:center;gap:5px;font-size:10px;color:#64748b;margin-bottom:10px}

/* ── Scan log ── */
.sv{max-width:720px}
.stt{font-family:Georgia,serif;font-size:18px;color:#0f172a;margin-bottom:6px;font-weight:700}
.sdesc{font-size:11px;color:#94a3b8;margin-bottom:12px;line-height:1.6}
.slog{display:flex;flex-direction:column;gap:4px}
.le{padding:8px 11px;border-radius:5px;border-left:3px solid;font-size:11px;line-height:1.55}

/* ── ADP result ── */
.adp-result{margin-top:14px}
.adp-verdict{display:inline-block;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.adp-adp{background:#f0fdf4;color:#15803d;border:0.5px solid #86efac}
.adp-skip{background:#f8f9fb;color:#64748b;border:0.5px solid #e2e8f0}
.adp-section{margin-bottom:12px}
.adp-label{font-size:9px;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.adp-val{font-size:11.5px;color:#0f172a;line-height:1.6;background:#fff;border:0.5px solid #e2e8f0;border-radius:6px;padding:8px 10px}

/* ── Misc ── */
.fab-row{display:flex;justify-content:space-between;padding:8px 16px;background:#fff;border-top:0.5px solid #e2e8f0;flex-shrink:0;align-items:center}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

// CLAUDE API
// ═══════════════════════════════════════════════════════
async function callClaude(model, systemPrompt, userContent, maxTokens=1200) {
  const messages = [{role:"user",content:userContent}];
  const body = {model, max_tokens:maxTokens, messages};
  if(systemPrompt) body.system = systemPrompt;
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  const d = await r.json();
  return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("") || "";
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function gf(){
  const q=(document.getElementById("srch")||{value:""}).value.toLowerCase();
  const t=(document.getElementById("ft")||{value:"All"}).value;
  const s=(document.getElementById("fs")||{value:"All"}).value;
  const ta=(document.getElementById("fta")||{value:"All"}).value;
  return accs.filter(a=>{
    const mq=!q||[a.name,a.drug,a.pi,a.ta,a.notes].some(f=>String(f||"").toLowerCase().includes(q));
    return mq&&(t==="All"||String(a.tier)===t)&&(s==="All"||a.stage===s)&&(ta==="All"||a.ta===ta);
  }).sort((a,b)=>sord(b.stage)-sord(a.stage));
}

function draw(){
  const an=accs.filter(a=>a.stage==="act_now");
  const bar=document.getElementById("abar"),nm=document.getElementById("abar-names");
  if(an.length){bar.classList.add("on");nm.innerHTML=an.map(a=>`<span class="alink" onclick="sel('${a.id}')">${esc(a.name)}</span>`).join("");}
  else bar.classList.remove("on");
  const fa=gf();
  document.getElementById("alist").innerHTML=fa.length?fa.map(a=>{
    const st=SM[a.stage]||STAGES[0];
    const ec=evs.filter(e=>e.accountId===a.id).length;
    return`<div class="ac${selId===a.id?" sel":""}" onclick="sel('${a.id}')">
      <div class="acr"><div class="dot" style="background:${st.color}"></div><div class="an">${esc(a.name)}</div><div class="tier">T${a.tier}${ec?` ·${ec}ev`:""}</div></div>
      <div class="ata">${esc(a.ta)}${a.drug?" · "+esc(a.drug.slice(0,14)):""}</div>
      ${a.scanBadge?`<div class="sbg" title="${esc(a.scanBadge)}">⚡ ${esc(a.scanBadge.slice(0,52))}${a.scanBadge.length>52?"…":""}</div>`:""}
    </div>`;
  }).join(""):`<div class="es">No accounts match.</div>`;
  document.getElementById("kc").textContent=`${accs.length} accts · ${evs.length} evidence · ${TODAY}`;
  document.getElementById("fab-ev").style.display=view==="evidence"?"inline-block":"none";
  drawMain();
}

function drawMain(){
  const m=document.getElementById("main");
  if(view==="pipeline"){
    if(editing){m.innerHTML=renderEdit();return;}
    if(selId){const a=accs.find(x=>x.id===selId);if(a){m.innerHTML=renderDetail(a);return;}}
    m.innerHTML=renderPL();
  }else if(view==="evidence"){m.innerHTML=renderEvidence();}
  else if(view==="scan"){m.innerHTML=renderScanView();}
  else if(view==="briefing"){m.innerHTML=renderBriefing();}
  else if(view==="adp"){m.innerHTML=renderADP();}
}

  const fa=gf();let h="";
  for(const st of STAGES){

    const sa=fa.filter(a=>a.stage===st.id);if(!sa.length)continue;

async function runADP(){
  if(!adpInput.trim()) return;
  adpLoad=true; adpResult=null; drawMain();

  const systemPrompt=`You are a Wiley IME conflict-of-interest and academic publishing expert analysing articles for IME grant potential in the DACH+France pharma market. Today: ${TODAY}.

You must respond with ONLY a valid JSON object — no markdown, no explanation, no backticks.

Rules:
- pharmaAuthors: ONLY authors with pharma company affiliation (not academics receiving grants)
- kolAuthors: senior academics (Prof/MD level) with documented pharma publication history — must include ambassadorPotential
- coiResult=SKIP if: all authors are academic with no pharma employment, OR Case Report/Letter/Editorial/Viewpoint, OR <20 patients, OR non-EU population with no DACH/France angle
- coiResult=ADP if: at least one confirmed pharma company co-author, OR strong clinical hook with DACH/France author relevance
- hookProblem: SPECIFIC — name the exact drug, indication, and precise clinical challenge HCPs face
- adpAngle: concrete IME format (e.g. "Expert consensus eLearning module for haematologists: managing X under Y")
- outreachTargets: 3 SPECIFIC Medical Affairs roles with company names
- gap: PRECISE HCP knowledge/decision gap

Required JSON keys: tier, coiResult, coiReason, hookDrug, hookProblem, hookStudyType, hookRareDisease (bool), adpAngle, positioning, outreachTargets (array), gap, pharmaAuthors (array of {name,affiliation,email}), kolAuthors (array of {name,affiliation,email,pharmaLink,ambassadorPotential}), hcpVerification (array of {name,orcidFound,orcidId,orcidUrl,kbvFound,verificationStatus,verificationNote})`;

  try{
    const raw = await callClaude(OPUS, systemPrompt, `Analyse this article for IME/ADP potential:\n\n${adpInput}`, 1500);
    const clean = raw.replace(/```json|```/g,"").trim();
    adpResult = JSON.parse(clean);
  }catch(e){
    adpResult = {
      coiResult:"ERROR",
      coiReason:`Could not parse Opus 4.8 response: ${e.message}. Raw output logged to console.`,
      tier:"—",hookDrug:"—",hookProblem:"—",hookStudyType:"—",hookRareDisease:false,
      adpAngle:"—",positioning:"—",outreachTargets:[],gap:"—",
      pharmaAuthors:[],kolAuthors:[],hcpVerification:[]
    };
  }
  adpLoad=false; drawMain();
}

function showAddEv(){
  const aO=accs.map(a=>`<option value="${a.id}">${esc(a.name)} — T${a.tier}</option>`).join("");
  const tO=EV_TYPES.map(t=>`<option>${t}</option>`).join("");
  const sO=IME_SIGNALS.map(s=>`<option>${s}</option>`).join("");
  const m=document.getElementById("main");
  const ov=document.createElement("div");ov.className="mo";
  ov.innerHTML=`<div class="md" onclick="event.stopPropagation()"><div class="mt">Add Evidence Item</div>
    <div class="fg"><label>Account</label><select id="eacc"><option value="">Select…</option>${aO}</select></div>
    <div class="fg"><label>Drug / Programme</label><input id="edrg"/></div>
    <div class="fgr"><div class="fg"><label>Type</label><select id="etyp">${tO}</select></div><div class="fg"><label>IME Signal</label><select id="esig">${sO}</select></div></div>
    <div class="fg"><label>Title</label><input id="etit"/></div>
    <div class="fg"><label>NCT / Study ID</label><input id="enct"/></div>
    <div class="fg"><label>Status</label><input id="esta"/></div>
    <div class="fg"><label>Congress / Event</label><input id="econ"/></div>
    <div class="fg"><label>PI / KOL</label><input id="epii"/></div>
    <div class="fg"><label>Wiley Publication / DOI</label><input id="ewly"/></div>
    <div class="fg"><label>Notes</label><textarea id="enot"></textarea></div>
    <div class="ar" style="margin-top:8px"><button class="btn btnp" onclick="doAddEv()">Add</button><button class="btn" onclick="this.closest('.mo').remove()">Cancel</button></div>
  </div>`;
  ov.onclick=()=>ov.remove();m.appendChild(ov);
}
function doAddEv(){
  const aid=document.getElementById("eacc").value;
  const acc=accs.find(a=>a.id===aid);
  evs.push({id:"ev_"+Date.now(),accountId:aid,account:acc?acc.name:"",drug:document.getElementById("edrg").value,type:document.getElementById("etyp").value,imeSignal:document.getElementById("esig").value,title:document.getElementById("etit").value||"Untitled",nct:document.getElementById("enct").value,status:document.getElementById("esta").value,congress:document.getElementById("econ").value,pi:document.getElementById("epii").value,wileyLink:document.getElementById("ewly").value,notes:document.getElementById("enot").value});
  document.querySelector(".mo")?.remove();draw();
}

draw();
</script>
</body>
